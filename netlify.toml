# netlify.toml (colocar na raiz do repositório)
[build]
  command = "npm run build"
  # publish é ignorado pelo plugin Next.js, mas mantenha por compatibilidade
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Cabeçalhos de cache para assets estáticos gerados pelo Next
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache menos agressivo para os arquivos root (HTML/SSR)
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Se você tiver imagens estáticas em /public/images ou /images
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirects / rewrite: o plugin Next cuida das rotas, normalmente não é necessário
# Mas se você precisar de um fallback para SPA em builds estáticos:
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200